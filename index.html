<!doctype html>

    <!-- Primary SEO -->
    <title>PasswordClaude — Zero-Knowledge Password Manager</title>

    <meta name="author" content="Subarna Katwal" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://passwordclaude.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://passwordclaude.vercel.app/" />
    <meta property="og:title" content="PasswordClaude — Zero-Knowledge Password Manager" />
    <meta property="og:description" content="Minimal, open-source password manager with AES-256-GCM encryption and zero-knowledge architecture. Your master password never leaves your device." />
    <meta property="og:image" content="https://passwordclaude.vercel.app/logo.png" />
    <meta property="og:site_name" content="PasswordClaude" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:image" content="https://passwordclaude.vercel.app/logo.png" />
    <meta name="twitter:creator" content="@nepnpc" />

        "@type": "Person",
